<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sponsors | FES 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: #0b1c39;
      background: #f7f9fc;
    }

    /* NAVBAR (UPDATED) */
    nav {
      display: flex;
      justify-content: center;
      padding: 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(10px);
    }

    .nav-container {
      display: flex;
      gap: 20px;
      align-items: center;
      background: rgba(255,255,255,0.5);
      padding: 10px 20px;
      border-radius: 40px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    }

    .nav-container a {
      text-decoration: none;
      color: #0b1c39;
      padding: 10px 18px;
      border-radius: 20px;
      font-weight: 500;
      transition: 0.3s;
    }

    /* ACTIVE BUTTON */
    .nav-container a.active {
      background: rgba(0, 0, 0, 0.05);
      font-weight: 600;
    }

    .nav-container a:hover {
      background: rgba(0,0,0,0.05);
    }

    /* HEADER */
    .header {
      text-align: center;
      padding: 80px 20px 40px;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      font-weight: 700;
    }

    .header span {
      color: #2bb673;
      font-style: italic;
    }

    .header p {
      margin-top: 15px;
      color: #555;
    }

    /* GRID BG */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: linear-gradient(#e6ecf3 1px, transparent 1px),
                        linear-gradient(90deg, #e6ecf3 1px, transparent 1px);
      background-size: 45px 45px;
      opacity: 0.5;
      z-index: -1;
    }

    /* SPONSORS */
    .sponsors {
      padding: 60px;
      display: grid;
      gap: 70px;
    }

    .tier {
      text-align: center;
    }

    .tier h2 {
      font-size: 2rem;
      margin-bottom: 30px;
      font-family: 'Playfair Display', serif;
    }

    .card-container {
      display: flex;
      justify-content: center;
      gap: 35px;
      flex-wrap: wrap;
    }

    .card {
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.75);
      padding: 30px;
      width: 260px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-12px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.12);
    }

    .card img {
      width: 140px;
      height: 80px;
      object-fit: contain;
      margin-bottom: 15px;
    }

    .card a {
      text-decoration: none;
      color: #0b1c39;
      font-weight: 600;
    }

    .gold {
      border-top: 5px solid gold;
    }

    .partner {
      border-top: 5px solid #2bb673;
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #777;
    }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav>
    <div class="nav-container">
      <a href="index.html" class="active">Home</a>
      <a href="about.html">About</a>
      <a href="events.html">Events</a>
      <a href="speakers.html">Speakers</a>
      <a href="schedule.html">Schedule</a>
      <a href="team.html">Team</a>
      <a href="sponsors.html">Sponsors</a>
    </div>
  </nav>

  <!-- HEADER -->
  <section class="header">
    <h1>Our <span>Sponsors</span></h1>
    <p>Partners powering Finance & Economics Summit 2026</p>
  </section>

  <!-- SPONSORS -->
  <section class="sponsors">

    <div class="tier">
      <h2>Gold Partner</h2>
      <div class="card-container">
        <div class="card gold">
          <img src="images/growlogo.png" alt="Groww">
          <a href="https://groww.in" target="_blank">Groww</a>
        </div>
      </div>
    </div>

    <div class="tier">
      <h2>Partners</h2>
      <div class="card-container">

        <div class="card partner">
          <img src="images/upstoxlogo.png" alt="Upstox">
          <a href="https://upstox.com" target="_blank">Upstox</a>
        </div>

        <div class="card partner">
          <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
          <a href="https://instagram.com/theiitian_club" target="_blank">@theiitian_club</a>
        </div>

      </div>
    </div>

  </section>

  <footer>
    © 2026 Finance & Economics Summit | IIT Ropar
  </footer>

</body>
</html>
