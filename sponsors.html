<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sponsors | FES 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: #0b1c39;
      overflow-x: hidden;
      background: #f7f9fc;
      position: relative;
    }

    /* GRID BACKGROUND */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: linear-gradient(#dfe6ee 1px, transparent 1px),
                        linear-gradient(90deg, #dfe6ee 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      z-index: -2;
    }

    /* GRADIENT GLOW */
    body::after {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(43,182,115,0.25), transparent 70%);
      top: 10%;
      right: -150px;
      z-index: -1;
    }

    /* NAVBAR */
    nav {
      display: flex;
      justify-content: space-between;
      padding: 20px 60px;
      align-items: center;
    }

    nav h2 {
      font-weight: 700;
    }

    nav ul {
      display: flex;
      gap: 25px;
      list-style: none;
    }

    nav ul li a {
      text-decoration: none;
      color: #0b1c39;
      font-weight: 500;
    }

    nav ul li a:hover {
      color: #2bb673;
    }

    /* HEADER */
    .header {
      text-align: center;
      padding: 80px 20px 40px;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      font-weight: 700;
    }

    .header span {
      color: #2bb673;
      font-style: italic;
    }

    .header p {
      margin-top: 15px;
      color: #555;
    }

    /* SECTION */
    .sponsors {
      padding: 60px;
      display: grid;
      gap: 70px;
    }

    .tier {
      text-align: center;
    }

    .tier h2 {
      font-size: 2rem;
      margin-bottom: 30px;
      font-family: 'Playfair Display', serif;
    }

    .card-container {
      display: flex;
      justify-content: center;
      gap: 35px;
      flex-wrap: wrap;
    }

    /* GLASS CARD */
    .card {
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.75);
      padding: 30px;
      width: 260px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      transition: 0.3s;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .card:hover {
      transform: translateY(-12px) scale(1.02);
      box-shadow: 0 20px 50px rgba(0,0,0,0.12);
    }

    .card img {
      width: 140px;
      height: 80px;
      object-fit: contain;
      margin-bottom: 15px;
    }

    .card a {
      text-decoration: none;
      color: #0b1c39;
      font-weight: 600;
      display: block;
      margin-top: 10px;
    }

    .gold {
      border-top: 5px solid gold;
    }

    .partner {
      border-top: 5px solid #2bb673;
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #777;
    }

    @media(max-width: 768px){
      .header h1 {
        font-size: 2.3rem;
      }

      nav {
        flex-direction: column;
        gap: 10px;
      }
    }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav>
    <h2>FES 2026</h2>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="events.html">Events</a></li>
      <li><a href="schedule.html">Schedule</a></li>
      <li><a href="team.html">Team</a></li>
      <li><a href="sponsors.html">Sponsors</a></li>
    </ul>
  </nav>

  <!-- HEADER -->
  <section class="header">
    <h1>Our <span>Sponsors</span></h1>
    <p>Partners powering Finance & Economics Summit 2026</p>
  </section>

  <!-- SPONSORS -->
  <section class="sponsors">

    <!-- GOLD -->
    <div class="tier">
      <h2>Gold Partner</h2>
      <div class="card-container">

        <div class="card gold">
          <img src="images/growlogo.png" alt="Groww">
          <a href="https://groww.in" target="_blank">Groww</a>
        </div>

      </div>
    </div>

    <!-- PARTNERS -->
    <div class="tier">
      <h2>Partners</h2>
      <div class="card-container">

        <div class="card partner">
          <img src="images/upstoxlogo.png" alt="Upstox">
          <a href="https://upstox.com" target="_blank">Upstox</a>
        </div>

        <div class="card partner">
          <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="IITian Club">
          <a href="https://instagram.com/theiitian_club" target="_blank">@theiitian_club</a>
        </div>

      </div>
    </div>

  </section>

  <footer>
    © 2026 Finance & Economics Summit | IIT Ropar
  </footer>

</body>
</html>
